<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vertex Link</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#FFFFFF;font-family:'Syne',sans-serif;}

#loader{
  position:fixed;inset:0;background:#FFFFFF;
  display:flex;align-items:center;justify-content:center;
  z-index:100;
  transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);
}
#loader.exit{opacity:0;transform:scale(1.025);pointer-events:none;}

/* ── FOND : grille fine + lueur orange très douce au centre ── */
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,71,255,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,71,255,.06) 1px,transparent 1px);
  background-size:52px 52px;
  pointer-events:none;
}
/* Lueur centrale ambre — très subtile, donne de la profondeur */
.bg-glow{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 55% at 50% 48%,
    rgba(0,71,255,.07) 0%,
    transparent 70%);
  pointer-events:none;
}
/* Fondu sur les bords pour que la grille disparaisse proprement */
.bg-grid::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 40%,rgba(255,255,255,.88) 100%);
}

/* ── CADRE LIGNES ── */
.fl{position:absolute;background:rgba(0,71,255,.05);pointer-events:none;opacity:0;transition:opacity .9s ease;}
.fl.on{opacity:1;}
.fl-t{top:8%;left:8%;right:8%;height:1px;}
.fl-b{bottom:8%;left:8%;right:8%;height:1px;}
.fl-l{left:8%;top:8%;bottom:8%;width:1px;}
.fl-r{right:8%;top:8%;bottom:8%;width:1px;}

/* ── CROIX REPÈRES ── */
.px{
  position:absolute;width:11px;height:11px;
  pointer-events:none;opacity:0;transition:opacity .45s ease;
}
.px.on{opacity:1;}
.px::before,.px::after{content:'';position:absolute;}
.px::before{width:1px;height:100%;left:5px;top:0;background:rgba(0,71,255,.2);}
.px::after {height:1px;width:100%;top:5px;left:0;background:rgba(0,71,255,.2);}
/* Accent orange */
.px.acc::before{background:rgba(0,71,255,.5);}
.px.acc::after {background:rgba(0,71,255,.5);}

/* Coins */
.px-tl{top:calc(8% - 5.5px);left:calc(8% - 5.5px);}
.px-tr{top:calc(8% - 5.5px);right:calc(8% - 5.5px);}
.px-bl{bottom:calc(8% - 5.5px);left:calc(8% - 5.5px);}
.px-br{bottom:calc(8% - 5.5px);right:calc(8% - 5.5px);}
/* Milieu bords */
.px-tc{top:calc(8% - 5.5px);left:50%;transform:translateX(-50%);}
.px-bc{bottom:calc(8% - 5.5px);left:50%;transform:translateX(-50%);}
.px-lc{left:calc(8% - 5.5px);top:50%;transform:translateY(-50%);}
.px-rc{right:calc(8% - 5.5px);top:50%;transform:translateY(-50%);}

/* ── LABELS COINS ── */
.clbl{
  position:absolute;font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(0,71,255,.28);pointer-events:none;
  opacity:0;transition:opacity .8s ease;white-space:nowrap;
}
.clbl.on{opacity:1;}
.cl-tl{top:calc(8% + 9px);left:calc(8% + 13px);}
.cl-tr{top:calc(8% + 9px);right:calc(8% + 13px);}
.cl-bl{bottom:calc(8% + 9px);left:calc(8% + 13px);}
.cl-br{bottom:calc(8% + 9px);right:calc(8% + 13px);}

/* ── GRAFFITIS ── */
.gf{
  position:absolute;font-family:'DM Mono',monospace;
  font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(0,71,255,.07);user-select:none;pointer-events:none;
  white-space:nowrap;opacity:0;transform:translateY(4px);
  transition:opacity .9s ease,transform .9s ease;
}
.gf.on{opacity:1;transform:none;}
.gf1{top:14%;left:12%;}
.gf2{top:21%;right:11%;font-size:8.5px;}
.gf3{top:33%;left:8%;}
.gf4{top:40%;right:10%;}
.gf5{top:57%;left:13%;font-size:8.5px;}
.gf6{top:65%;right:11%;}
.gf7{top:76%;left:9%;font-size:8.5px;}
.gf8{top:82%;right:12%;}

/* ── LOGO HAUT GAUCHE ── */
.logo-corner{
  position:absolute;
  top:calc(8% + 13px);
  left:calc(8% + 96px);
  display:flex;align-items:center;gap:8px;
  opacity:0;animation:fi .7s ease .4s forwards;
  z-index:10;
}
.logo-corner-name{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:.01em;
  color:rgba(0,71,255,.5);
}
.logo-corner-name b{font-weight:800;color:rgba(0,71,255,.75);}

/* ── CENTRE ── */
.center{
  display:flex;flex-direction:column;
  align-items:center;gap:36px;
  position:relative;z-index:5;
}

/* Logo icône */
.icon{opacity:0;transform:translateY(10px);animation:fu .8s cubic-bezier(.16,1,.3,1) .15s forwards;}

/* Compteur */
.ctr{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  opacity:0;animation:fu .6s cubic-bezier(.16,1,.3,1) .45s forwards;
}
.ctr-n{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(36px,5vw,56px);
  letter-spacing:-.055em;line-height:1;
  color:#111111;font-variant-numeric:tabular-nums;
  position:relative;
}
/* Glitch orange discret */
.ctr-n::before{
  content:attr(data-v);position:absolute;inset:0;
  color:#111111;
  clip-path:polygon(0 28%,100% 28%,100% 40%,0 40%);
  transform:translateX(-2px);opacity:.28;
  animation:glitch 3.5s infinite;
}
@keyframes glitch{
  0%,88%,100%{transform:translateX(-2px);opacity:.28}
  90%{transform:translateX(3px);opacity:.45}
  93%{transform:translateX(-1px);opacity:.2}
}

/* Barre progression */
.bar-out{
  width:min(240px,52vw);height:1px;
  background:rgba(0,71,255,.07);
  position:relative;
}
.bar-in{
  height:100%;width:0;
  background:rgba(0,71,255,.55);
  transition:width .04s linear;
  position:relative;
}
.bar-in::after{
  content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);
  width:3px;height:3px;border-radius:50%;
  background:#FFFFFF;box-shadow:0 0 8px 2px rgba(255,255,255,.7);
}
/* Ticks aux extrémités */
.bar-out::before{content:'';position:absolute;left:-1px;top:-3px;bottom:-3px;width:1px;background:rgba(0,71,255,.18);}
.bar-out::after {content:'';position:absolute;right:-1px;top:-3px;bottom:-3px;width:1px;background:rgba(0,71,255,.18);}

.stxt{
  font-family:'DM Mono',monospace;font-size:10.5px;
  letter-spacing:.14em;text-transform:uppercase;
  color:rgba(0,71,255,.36);height:13px;
}

/* Tagline */
.tagline{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:.18em;text-transform:uppercase;
  color:rgba(0,71,255,.12);
  opacity:0;animation:fi .5s ease .9s forwards;
}

@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fi{from{opacity:0}to{opacity:1}}

/* Grain */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.032'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;mix-blend-mode:multiply;
}
</style>
</head>
<body>
<div id="loader">

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- Cadre -->
  <div class="fl fl-t"></div>
  <div class="fl fl-b"></div>
  <div class="fl fl-l"></div>
  <div class="fl fl-r"></div>

  <!-- Croix blanches aux 8 points -->
  <div class="px px-tl"></div>
  <div class="px px-tr"></div>
  <div class="px px-bl"></div>
  <div class="px px-br"></div>
  <div class="px px-tc"></div>
  <div class="px px-bc"></div>
  <!-- Croix oranges sur les côtés -->
  <div class="px acc px-lc"></div>
  <div class="px acc px-rc"></div>

  <!-- Labels coins -->
  <div class="clbl cl-tl">Vertex Link</div>
  <div class="clbl cl-tr">© 2025</div>
  <div class="clbl cl-bl">Agence Web</div>
  <div class="clbl cl-br">FR — Remote</div>

  <!-- Logo discret haut gauche -->
  <div class="logo-corner">
    <img src="logo.png" alt="VL" width="22" height="22" style="width:22px;height:22px;object-fit:contain;background:#EEEEEE;border-radius:6px;padding:3px;opacity:.8">
    <span class="logo-corner-name">Vertex<b>Link</b></span>
  </div>

  <!-- Graffitis -->
  <span class="gf gf1">— sites vitrines</span>
  <span class="gf gf2">lighthouse 95+</span>
  <span class="gf gf3">// html · css · js</span>
  <span class="gf gf4">zéro template</span>
  <span class="gf gf5">seo · core web vitals</span>
  <span class="gf gf6">mobile first · 14 jours</span>
  <span class="gf gf7">landing pages · sur mesure</span>
  <span class="gf gf8">design premium</span>

  <!-- Centre -->
  <div class="center">
    <div class="icon"><img src="logo.png" alt="Vertex Link" width="64" height="64" style="width:64px;height:64px;object-fit:contain;background:#EEEEEE;border-radius:14px;padding:8px;"></div>

    <div class="ctr">
      <div class="ctr-n" id="cNum" data-v="0">0</div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:9px">
        <div class="bar-out"><div class="bar-in" id="bar"></div></div>
        <div class="stxt" id="stxt">Initialisation...</div>
      </div>
    </div>

    <div class="tagline">Vertex Link · Agence Web · Code sur mesure</div>
  </div>

</div>

<script>
(function(){
  const d=(el,ms)=>setTimeout(()=>el.classList.add('on'),ms);
  document.querySelectorAll('.fl').forEach((el,i)=>d(el,150+i*55));
  document.querySelectorAll('.px').forEach((el,i)=>d(el,280+i*50));
  document.querySelectorAll('.clbl').forEach((el,i)=>d(el,500+i*70));
  document.querySelectorAll('.gf').forEach((el,i)=>d(el,260+i*120));

  const num=document.getElementById('cNum'),bar=document.getElementById('bar'),stxt=document.getElementById('stxt');
  const msgs=[{at:0,t:'Initialisation...'},{at:18,t:'Chargement des assets...'},{at:42,t:'Compilation du design...'},{at:66,t:'Optimisation SEO...'},{at:88,t:'Lighthouse check...'},{at:97,t:'Prêt.'}];
  let cur=0,start=performance.now(),dur=2800;

  function ease(t){return t<.5?Math.pow(2,20*t-10)/2:(2-Math.pow(2,-20*t+10))/2;}

  (function tick(now){
    const raw=Math.min((now-start)/dur,1);
    const p=raw<.87?ease(raw/.87)*.97:raw<.94?.97:.97+(raw-.94)/.06*.03;
    const v=Math.round(p*100);
    if(v!==cur){
      cur=v;num.textContent=v;num.dataset.v=v;bar.style.width=v+'%';
      const m=msgs.filter(m=>v>=m.at).pop();if(m)stxt.textContent=m.t;
    }
    raw<1?requestAnimationFrame(tick):setTimeout(exit,320);
  })(performance.now());

  function exit(){
    document.getElementById('loader').classList.add('exit');
    setTimeout(()=>window.location.href='index.html',880);
  }
})();
</script>
</body>
</html>
